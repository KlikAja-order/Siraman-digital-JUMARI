<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | E-Gov Siraman by Jumari</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background-color: #0a0d14; color: #f3f4f6; font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass-panel { background: rgba(18, 24, 38, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <!-- Modal Login Admin -->
  <div id="login-card" class="w-full max-w-md glass-panel p-8 rounded-2xl shadow-2xl relative">
    <div class="text-center mb-6">
      <div class="w-12 h-12 rounded-xl bg-emerald-500/20 border border-emerald-500/40 text-emerald-400 font-bold text-2xl flex items-center justify-center mx-auto mb-3">
        J
      </div>
      <h2 class="text-xl font-bold text-white">E-Gov Siraman Admin</h2>
      <p class="text-xs text-gray-400 mt-1">Masukan akun kredensial Anda untuk mengelola portal</p>
    </div>

    <form onsubmit="handleLogin(event)" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-300 mb-1">Email Administrator</label>
        <input type="email" id="email" required value="admin@siraman.desa.id" class="w-full bg-slate-900 border border-gray-700 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-emerald-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-300 mb-1">Password</label>
        <input type="password" id="password" required value="admin123" class="w-full bg-slate-900 border border-gray-700 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-emerald-500">
      </div>
      <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-3 rounded-xl text-xs uppercase tracking-wider transition shadow-lg shadow-emerald-500/20">
        Masuk Ke Dashboard
      </button>
    </form>
    
    <div class="mt-6 text-center">
      <a href="index.html" class="text-xs text-gray-500 hover:text-emerald-400 flex items-center justify-center gap-1">
        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Kembali ke Halaman Depan
      </a>
    </div>
  </div>

  <!-- Dashboard Setelah Login -->
  <div id="admin-dashboard" class="hidden w-full max-w-4xl glass-panel p-6 rounded-2xl">
    <div class="flex items-center justify-between pb-4 border-b border-gray-800 mb-6">
      <div>
        <h2 class="text-lg font-bold text-white">Dashboard Kontrol E-Gov</h2>
        <p class="text-xs text-emerald-400">Status: Terkoneksi (Admin Aktif)</p>
      </div>
      <button onclick="logout()" class="px-3 py-1.5 bg-red-500/20 text-red-400 border border-red-500/30 rounded-lg text-xs font-semibold">
        Keluar / Logout
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="p-4 bg-slate-900/60 rounded-xl border border-gray-800">
        <h3 class="text-sm font-bold text-white mb-2">+ Tambah Berita / Program Baru</h3>
        <input type="text" placeholder="Judul Berita..." class="w-full bg-slate-950 border border-gray-800 rounded-lg p-2 text-xs text-white mb-2">
        <textarea placeholder="Isi penjelasan program..." class="w-full bg-slate-950 border border-gray-800 rounded-lg p-2 text-xs text-white mb-3" rows="3"></textarea>
        <button onclick="alert('Program berhasil ditambahkan ke portal!')" class="w-full bg-emerald-500 text-slate-950 font-bold py-2 rounded-lg text-xs">Publikasikan</button>
      </div>

      <div class="p-4 bg-slate-900/60 rounded-xl border border-gray-800">
        <h3 class="text-sm font-bold text-white mb-2">Aspirasi Warga Masuk</h3>
        <div class="space-y-2">
          <div class="p-2.5 bg-slate-950 rounded-lg border border-gray-800 text-xs">
            <div class="flex justify-between text-gray-400 mb-1">
              <span class="font-bold text-white">Pak Budi (RT 03)</span>
              <span>Hari ini</span>
            </div>
            <p class="text-gray-300">Mohon perbaikan penerangan jalan umum di blok selatan...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    function handleLogin(e) {
      e.preventDefault();
      document.getElementById('login-card').classList.add('hidden');
      document.getElementById('admin-dashboard').classList.remove('hidden');
    }

    function logout() {
      document.getElementById('admin-dashboard').classList.add('hidden');
      document.getElementById('login-card').classList.remove('hidden');
    }
  </script>
</body>
</html>
