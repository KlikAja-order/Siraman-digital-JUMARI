<!DOCTYPE html>
<html lang="id" class="dark scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Gov Siraman by Jumari - Portal Layanan & Transparansi Desa</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e'
            },
            accent: {
              500: '#10b981', 600: '#059669'
            },
            darkbg: '#090d16'
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #090d16; color: #f8fafc; }
    .glass-panel {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glass-card {
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #0284c7; border-radius: 10px; }
  </style>
</head>
<body class="min-h-screen custom-scrollbar antialiased">

  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJHvVWe9zT2mdku3s5TP_KyJEEn8XF6So",
      authDomain: "siraman-digital.firebaseapp.com",
      databaseURL: "https://siraman-digital-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "siraman-digital",
      storageBucket: "siraman-digital.firebasestorage.app",
      messagingSenderId: "834135841361",
      appId: "1:834135841361:web:27cc66fd8c1ec2d02b3670"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const { useState, useEffect } = React;

    // Helper: Kompresi Foto ke Base64 (Maksimal 800px)
    const convertFileToBase64 = (file) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800;
            let width = img.width;
            let height = img.height;

            if (width > MAX_WIDTH) {
              height = Math.round((height * MAX_WIDTH) / width);
              width = MAX_WIDTH;
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
          };
          img.onerror = (err) => reject(err);
        };
        reader.onerror = (error) => reject(error);
      });
    };

    function App() {
      const [view, setView] = useState('home'); // home, layanan, berita, transparansi, kependudukan, saran, login, admin
      const [user, setUser] = useState(null);
      
      const [berita, setBerita] = useState([]);
      const [layanan, setLayanan] = useState([]);
      const [saran, setSaran] = useState([]);

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        fetchData();
      }, []);

      const fetchData = async () => {
        try {
          const beritaSnap = await getDocs(collection(db, "berita"));
          setBerita(beritaSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.timestamp||0)-(a.timestamp||0)));

          const layananSnap = await getDocs(collection(db, "layanan"));
          setLayanan(layananSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.timestamp||0)-(a.timestamp||0)));

          const saranSnap = await getDocs(collection(db, "saran"));
          setSaran(saranSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.timestamp||0)-(a.timestamp||0)));
        } catch (e) {
          console.error("Gagal load data Firestore:", e);
        }
      };

      return (
        <div className="min-h-screen flex flex-col bg-[#090d16] text-slate-100">
          {/* Header Navigation */}
          <nav className="fixed top-0 w-full z-50 glass-panel px-4 py-3 border-b border-slate-800">
            <div className="max-w-7xl mx-auto flex justify-between items-center">
              <div onClick={() => setView('home')} className="flex items-center gap-3 cursor-pointer">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-600 to-accent-500 flex items-center justify-center text-white font-black text-lg shadow-lg shadow-brand-500/20">
                  EG
                </div>
                <div>
                  <h1 className="text-base font-bold leading-none tracking-tight">E-Gov Siraman</h1>
                  <p className="text-[10px] text-slate-400 font-medium">Official Platform <span className="text-brand-500">by Jumari</span></p>
                </div>
              </div>

              {/* Menu Publik */}
              <div className="hidden md:flex items-center gap-1 text-xs font-semibold text-slate-300">
                <button onClick={() => setView('home')} className={`px-3 py-2 rounded-lg transition ${view==='home'?'bg-brand-600/20 text-brand-500': 'hover:text-white'}`}>Beranda</button>
                <button onClick={() => setView('layanan')} className={`px-3 py-2 rounded-lg transition ${view==='layanan'?'bg-brand-600/20 text-brand-500': 'hover:text-white'}`}>Jemput Berkas</button>
                <button onClick={() => setView('berita')} className={`px-3 py-2 rounded-lg transition ${view==='berita'?'bg-brand-600/20 text-brand-500': 'hover:text-white'}`}>Berita Desa</button>
                <button onClick={() => setView('transparansi')} className={`px-3 py-2 rounded-lg transition ${view==='transparansi'?'bg-brand-600/20 text-brand-500': 'hover:text-white'}`}>Keuangan APBD</button>
                <button onClick={() => setView('kependudukan')} className={`px-3 py-2 rounded-lg transition ${view==='kependudukan'?'bg-brand-600/20 text-brand-500': 'hover:text-white'}`}>Data Penduduk</button>
                <button onClick={() => setView('saran')} className={`px-3 py-2 rounded-lg transition ${view==='saran'?'bg-brand-600/20 text-brand-500': 'hover:text-white'}`}>Kritik & Saran</button>
              </div>

              {/* Admin Button Tersembunyi (Ikon Kunci Kecil) */}
              <div className="flex items-center gap-2">
                {user ? (
                  <div className="flex items-center gap-2">
                    <button onClick={() => setView('admin')} className="px-3 py-1.5 rounded-lg bg-brand-600 hover:bg-brand-500 text-white text-xs font-bold transition">
                      ⚙️ Panel Admin
                    </button>
                    <button onClick={() => signOut(auth)} className="px-2 py-1.5 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white text-xs transition">
                      Keluar
                    </button>
                  </div>
                ) : (
                  <button 
                    onClick={() => setView('login')} 
                    title="Akses Sistem Admin" 
                    className="p-2 rounded-lg text-slate-600 hover:text-slate-300 transition"
                  >
                    🔐
                  </button>
                )}
              </div>
            </div>
          </nav>

          {/* Body Content */}
          <main className="flex-grow pt-20 pb-12">
            {view === 'home' && <HomeView setView={setView} berita={berita} />}
            {view === 'layanan' && <LayananJemputView fetchData={fetchData} />}
            {view === 'berita' && <BeritaView berita={berita} />}
            {view === 'transparansi' && <TransparansiKeuanganView />}
            {view === 'kependudukan' && <DataPendudukView />}
            {view === 'saran' && <KritikSaranView fetchData={fetchData} />}
            {view === 'login' && <LoginAdminView setView={setView} />}
            {view === 'admin' && user && (
              <AdminPanel 
                berita={berita} 
                layanan={layanan} 
                saran={saran} 
                fetchData={fetchData} 
              />
            )}
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800/80 py-6 text-center text-xs text-slate-500 bg-slate-950/40 backdrop-blur-md">
            <p>© 2026 E-Gov Siraman by Jumari. Solusi Administrasi & Transparansi Desa.</p>
          </footer>
        </div>
      );
    }

    // --- VIEW 1: HOME BERANDA ---
    function HomeView({ setView, berita }) {
      return (
        <div className="space-y-12 max-w-7xl mx-auto px-4 pt-4">
          <div className="glass-panel rounded-3xl p-8 md:p-14 border border-slate-800 relative overflow-hidden flex items-center justify-between">
            <div className="max-w-2xl z-10 space-y-6">
              <span className="px-3.5 py-1.5 rounded-full bg-brand-500/10 border border-brand-500/20 text-brand-400 font-semibold text-xs tracking-wide">
                🚀 Solusi Inovasi Administrasi by Jumari
              </span>
              <h1 className="text-3xl md:text-5xl font-extrabold leading-tight tracking-tight">
                Layanan Birokrasi Cepat, Transparan & Bebas Ribet.
              </h1>
              <p className="text-slate-400 text-sm leading-relaxed">
                Platform resmi E-Gov Kelurahan Siraman. Ajukan dokumen dari rumah, petugas lapangan kami siap menjemput persyaratan langsung ke rumah Anda!
              </p>
              <div className="flex flex-wrap gap-3 pt-2">
                <button onClick={() => setView('layanan')} className="px-6 py-3 rounded-xl bg-brand-600 hover:bg-brand-500 text-white text-xs font-bold shadow-lg shadow-brand-600/30 transition">
                  📦 Buat Permohonan / Jemput Berkas
                </button>
                <button onClick={() => setView('transparansi')} className="px-6 py-3 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-bold border border-slate-700 transition">
                  📊 Cek Keuangan Desa
                </button>
              </div>
            </div>
          </div>

          {/* Ringkasan Fitur Unggulan */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="glass-card p-6 rounded-2xl border border-slate-800 space-y-2">
              <div className="w-10 h-10 rounded-xl bg-brand-500/10 text-brand-400 flex items-center justify-center font-bold">🛵</div>
              <h3 className="font-bold text-base">Jemput Berkas Layangan</h3>
              <p className="text-xs text-slate-400 leading-relaxed">Persyaratan administrasi dijemput langsung oleh petugas ke rumah warga.</p>
            </div>
            <div className="glass-card p-6 rounded-2xl border border-slate-800 space-y-2">
              <div className="w-10 h-10 rounded-xl bg-accent-500/10 text-accent-400 flex items-center justify-center font-bold">💰</div>
              <h3 className="font-bold text-base">Transparansi Keuangan</h3>
              <p className="text-xs text-slate-400 leading-relaxed">Publikasi riil penggunaan dana desa dan anggaran kelurahan Siraman.</p>
            </div>
            <div className="glass-card p-6 rounded-2xl border border-slate-800 space-y-2">
              <div className="w-10 h-10 rounded-xl bg-purple-500/10 text-purple-400 flex items-center justify-center font-bold">📈</div>
              <h3 className="font-bold text-base">Data Penduduk Akurat</h3>
              <p className="text-xs text-slate-400 leading-relaxed">Statistik lengkap demografi warga dari tingkatan usia hingga gender.</p>
            </div>
          </div>
        </div>
      );
    }

    // --- VIEW 2: LAYANAN JEMPUT BERKAS (SOLUSI BY JUMARI) ---
    function LayananJemputView({ fetchData }) {
      const [formData, setFormData] = useState({
        nama: '', nik: '', padukuhan: '', whatsapp: '', jenisSurat: 'Surat Keterangan Usaha (SKU)', catatan: '', opsiJemput: true
      });
      const [filePersyaratan, setFilePersyaratan] = useState(null);
      const [loading, setLoading] = useState(false);
      const [success, setSuccess] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          let base64File = '';
          if (filePersyaratan) {
            base64File = await convertFileToBase64(filePersyaratan);
          }

          await addDoc(collection(db, "layanan"), {
            ...formData,
            lampiran: base64File,
            status: "Menunggu Penjemputan",
            timestamp: Date.now()
          });

          setSuccess(true);
          setFormData({ nama: '', nik: '', padukuhan: '', whatsapp: '', jenisSurat: 'Surat Keterangan Usaha (SKU)', catatan: '', opsiJemput: true });
          fetchData();
        } catch (err) {
          alert("Gagal mengirim permohonan berkas.");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="max-w-3xl mx-auto px-4 pt-4">
          <div className="glass-panel p-8 md:p-10 rounded-3xl border border-slate-800 space-y-6">
            <div>
              <span className="text-xs font-bold text-brand-500 uppercase tracking-widest">Inovasi Layanan by Jumari</span>
              <h2 className="text-2xl font-bold mt-1">Permohonan & Antar-Jemput Berkas</h2>
              <p className="text-xs text-slate-400 mt-1">Isi formulir di bawah ini. Petugas kelurahan akan memverifikasi dan datang ke rumah kamu untuk menjemput dokumen fisik!</p>
            </div>

            {success && (
              <div className="p-4 rounded-xl bg-accent-500/10 border border-accent-500/20 text-accent-400 text-xs font-medium">
                ✅ Permohonan berhasil diajukan! Tim petugas lapangan akan menghubungi nomor WhatsApp Anda untuk konfirmasi jadwal penjemputan berkas.
              </div>
            )}

            <form onSubmit={handleSubmit} className="space-y-4 text-xs">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label className="block mb-1 font-medium text-slate-300">Nama Lengkap Pemohon *</label>
                  <input required type="text" value={formData.nama} onChange={e=>setFormData({...formData, nama:e.target.value})} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="Sesuai KTP" />
                </div>
                <div>
                  <label className="block mb-1 font-medium text-slate-300">NIK (Nomor Induk Kependudukan) *</label>
                  <input required type="number" value={formData.nik} onChange={e=>setFormData({...formData, nik:e.target.value})} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="16 Digit NIK" />
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label className="block mb-1 font-medium text-slate-300">Padukuhan / RT / RW *</label>
                  <input required type="text" value={formData.padukuhan} onChange={e=>setFormData({...formData, padukuhan:e.target.value})} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="Contoh: Seneng, RT 02 / RW 05" />
                </div>
                <div>
                  <label className="block mb-1 font-medium text-slate-300">Nomor WhatsApp Aktif *</label>
                  <input required type="text" value={formData.whatsapp} onChange={e=>setFormData({...formData, whatsapp:e.target.value})} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="08xxxxxxxxxx" />
                </div>
              </div>

              <div>
                <label className="block mb-1 font-medium text-slate-300">Jenis Dokumen / Surat Yang Dibutuhkan</label>
                <select value={formData.jenisSurat} onChange={e=>setFormData({...formData, jenisSurat:e.target.value})} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500">
                  <option value="Surat Keterangan Usaha (SKU)">Surat Keterangan Usaha (SKU)</option>
                  <option value="Surat Keterangan Tidak Mampu (SKTM)">Surat Keterangan Tidak Mampu (SKTM)</option>
                  <option value="Pengantar Kartu Keluarga / KTP">Pengantar Kartu Keluarga / KTP</option>
                  <option value="Surat Keterangan Domisili">Surat Keterangan Domisili</option>
                  <option value="Surat Keterangan Kelahiran / Kematian">Surat Keterangan Kelahiran / Kematian</option>
                </select>
              </div>

              <div>
                <label className="block mb-1 font-medium text-slate-300">Foto Persyaratan (KTP / KK / Bukti Pendukung)</label>
                <input type="file" accept="image/*" onChange={e=>setFilePersyaratan(e.target.files[0])} className="w-full text-slate-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:bg-brand-600/20 file:text-brand-400 font-semibold cursor-pointer" />
              </div>

              <div>
                <label className="block mb-1 font-medium text-slate-300">Catatan Lokasi / Pesan Tambahan</label>
                <textarea rows="3" value={formData.catatan} onChange={e=>setFormData({...formData, catatan:e.target.value})} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="Patokan rumah atau informasi penting lainnya..."></textarea>
              </div>

              <div className="p-4 rounded-xl bg-slate-900 border border-slate-800 flex items-center gap-3">
                <input type="checkbox" checked={formData.opsiJemput} onChange={e=>setFormData({...formData, opsiJemput:e.target.checked})} id="jemput" className="w-4 h-4 text-brand-600 rounded" />
                <label htmlFor="jemput" className="text-slate-300 font-medium">Saya meminta petugas lapangan menjemput berkas fisik ke rumah saya.</label>
              </div>

              <button type="submit" disabled={loading} className="w-full py-3.5 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-bold transition shadow-lg shadow-brand-600/20 disabled:opacity-50">
                {loading ? 'Memproses Permohonan...' : '🚀 Kirim Permohonan & Jadwalkan Jemput'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // --- VIEW 3: BERITA KELURAHAN ---
    function BeritaView({ berita }) {
      return (
        <div className="max-w-7xl mx-auto px-4 pt-4 space-y-6">
          <div>
            <h2 className="text-2xl font-bold">Berita & Kabar Kelurahan Siraman</h2>
            <p className="text-xs text-slate-400">Pusat publikasi informasi dan kegiatan masyarakat terupdate.</p>
          </div>

          {berita.length === 0 ? (
            <div className="text-center py-12 glass-panel rounded-2xl border border-slate-800 text-xs text-slate-500">
              Belum ada berita yang diterbitkan.
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              {berita.map(b => (
                <div key={b.id} className="glass-card rounded-2xl overflow-hidden border border-slate-800 flex flex-col">
                  <img src={b.imageUrl || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=600&q=80'} className="h-48 w-full object-cover" />
                  <div className="p-5 space-y-2 flex-grow">
                    <span className="text-[10px] font-bold text-brand-400 uppercase tracking-wider">{b.kategori || 'Pengumuman'}</span>
                    <h3 className="font-bold text-base line-clamp-2">{b.judul}</h3>
                    <p className="text-xs text-slate-400 line-clamp-3 leading-relaxed">{b.isi}</p>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // --- VIEW 4: TRANSPARANSI KEUANGAN DESA ---
    function TransparansiKeuanganView() {
      return (
        <div className="max-w-7xl mx-auto px-4 pt-4 space-y-6">
          <div>
            <h2 className="text-2xl font-bold">Transparansi Keuangan APBD Kelurahan</h2>
            <p className="text-xs text-slate-400">Laporan realisasi anggaran pendapatan dan belanja desa secara transparan.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="glass-card p-6 rounded-2xl border border-slate-800 space-y-2">
              <span className="text-xs text-slate-400">Total Pendapatan Desa (2026)</span>
              <p className="text-2xl font-extrabold text-accent-400">Rp 1.850.000.000</p>
              <span className="text-[10px] text-slate-500">Dana Desa & Bagi Hasil Pajak</span>
            </div>
            <div className="glass-card p-6 rounded-2xl border border-slate-800 space-y-2">
              <span className="text-xs text-slate-400">Realisasi Pembangunan</span>
              <p className="text-2xl font-extrabold text-brand-400">Rp 1.240.000.000</p>
              <span className="text-[10px] text-slate-500">67% Terpakai</span>
            </div>
            <div className="glass-card p-6 rounded-2xl border border-slate-800 space-y-2">
              <span className="text-xs text-slate-400">Sisa Anggaran Kas</span>
              <p className="text-2xl font-extrabold text-purple-400">Rp 610.000.000</p>
              <span className="text-[10px] text-slate-500">Alokasi Semester II</span>
            </div>
          </div>

          <div className="glass-panel p-6 rounded-2xl border border-slate-800 space-y-4">
            <h3 className="font-bold text-base">Rincian Penggunaan Dana Usulan 2026</h3>
            <div className="space-y-3 text-xs">
              <div>
                <div className="flex justify-between mb-1">
                  <span>Pembangunan Infrastruktur Jalan & Drainase Padukuhan</span>
                  <span className="font-bold text-slate-300">Rp 750.000.000 (40%)</span>
                </div>
                <div className="w-full h-2 rounded-full bg-slate-800 overflow-hidden">
                  <div className="h-full bg-brand-500 w-[40%]"></div>
                </div>
              </div>
              <div>
                <div className="flex justify-between mb-1">
                  <span>Pemberdayaan UMKM & Ketahanan Pangan</span>
                  <span className="font-bold text-slate-300">Rp 450.000.000 (24%)</span>
                </div>
                <div className="w-full h-2 rounded-full bg-slate-800 overflow-hidden">
                  <div className="h-full bg-accent-500 w-[24%]"></div>
                </div>
              </div>
              <div>
                <div className="flex justify-between mb-1">
                  <span>Digitalisasi Pelayanan & Sistem E-Gov by Jumari</span>
                  <span className="font-bold text-slate-300">Rp 180.000.000 (10%)</span>
                </div>
                <div className="w-full h-2 rounded-full bg-slate-800 overflow-hidden">
                  <div className="h-full bg-purple-500 w-[10%]"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- VIEW 5: DATA DEMOGRAFI & PENDUDUK ---
    function DataPendudukView() {
      return (
        <div className="max-w-7xl mx-auto px-4 pt-4 space-y-6">
          <div>
            <h2 className="text-2xl font-bold">Statistik Kependudukan Siraman</h2>
            <p className="text-xs text-slate-400">Data rinci demografi warga Kelurahan Siraman terkini.</p>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div className="glass-card p-5 rounded-2xl border border-slate-800 text-center">
              <span className="text-xs text-slate-400">Total Warga</span>
              <p className="text-3xl font-black text-brand-400 mt-1">4,820</p>
            </div>
            <div className="glass-card p-5 rounded-2xl border border-slate-800 text-center">
              <span className="text-xs text-slate-400">Laki-Laki</span>
              <p className="text-3xl font-black text-slate-200 mt-1">2,380</p>
            </div>
            <div className="glass-card p-5 rounded-2xl border border-slate-800 text-center">
              <span className="text-xs text-slate-400">Perempuan</span>
              <p className="text-3xl font-black text-slate-200 mt-1">2,440</p>
            </div>
            <div className="glass-card p-5 rounded-2xl border border-slate-800 text-center">
              <span className="text-xs text-slate-400">Kepala Keluarga (KK)</span>
              <p className="text-3xl font-black text-accent-400 mt-1">1,410</p>
            </div>
          </div>

          <div className="glass-panel p-6 rounded-2xl border border-slate-800 space-y-4">
            <h3 className="font-bold text-base">Demografi Berdasarkan Kelompok Usia</h3>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
              <div className="p-4 rounded-xl bg-slate-900 border border-slate-800 space-y-1">
                <span className="text-slate-400">Anak-anak (0 - 14 Tahun)</span>
                <p className="text-xl font-extrabold text-brand-400">950 Jiwa (20%)</p>
              </div>
              <div className="p-4 rounded-xl bg-slate-900 border border-slate-800 space-y-1">
                <span className="text-slate-400">Usia Produktif / Dewasa (15 - 59 Tahun)</span>
                <p className="text-xl font-extrabold text-accent-400">3,120 Jiwa (64%)</p>
              </div>
              <div className="p-4 rounded-xl bg-slate-900 border border-slate-800 space-y-1">
                <span className="text-slate-400">Lansia (60+ Tahun)</span>
                <p className="text-xl font-extrabold text-purple-400">750 Jiwa (16%)</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- VIEW 6: KRITIK & SARAN ---
    function KritikSaranView({ fetchData }) {
      const [nama, setNama] = useState('');
      const [pesan, setPesan] = useState('');
      const [msg, setMsg] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        try {
          await addDoc(collection(db, "saran"), {
            nama: nama || 'Anonim',
            pesan,
            timestamp: Date.now()
          });
          setMsg("✅ Terima kasih! Kritik dan saran Anda telah tersampaikan.");
          setNama(''); setPesan('');
          fetchData();
        } catch (e) {
          setMsg("❌ Gagal mengirim masukan.");
        }
      };

      return (
        <div className="max-w-2xl mx-auto px-4 pt-4">
          <div className="glass-panel p-8 rounded-3xl border border-slate-800 space-y-6">
            <div>
              <h2 className="text-2xl font-bold">Kritik & Saran Warga</h2>
              <p className="text-xs text-slate-400 mt-1">Sampaikan masukan demi kemajuan birokrasi Kelurahan Siraman.</p>
            </div>

            {msg && <div className="p-3 rounded-xl bg-brand-500/10 border border-brand-500/20 text-brand-400 text-xs text-center">{msg}</div>}

            <form onSubmit={handleSubmit} className="space-y-4 text-xs">
              <div>
                <label className="block mb-1 font-medium">Nama Anda (Opsional / Boleh Anonim)</label>
                <input type="text" value={nama} onChange={e=>setNama(e.target.value)} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="Masukkan nama..." />
              </div>
              <div>
                <label className="block mb-1 font-medium">Kritik / Saran / Masukan *</label>
                <textarea required rows="4" value={pesan} onChange={e=>setPesan(e.target.value)} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="Tuliskan saran Anda..."></textarea>
              </div>
              <button type="submit" className="w-full py-3.5 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-bold transition shadow-lg shadow-brand-600/20">
                Kirim Saran
              </button>
            </form>
          </div>
        </div>
      );
    }

    // --- VIEW 7: LOGIN ADMIN ---
    function LoginAdminView({ setView }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [err, setErr] = useState('');

      const handleLogin = async (e) => {
        e.preventDefault();
        try {
          await signInWithEmailAndPassword(auth, email, password);
          setView('admin');
        } catch (error) {
          setErr("Login gagal. Periksa Email & Password Admin!");
        }
      };

      return (
        <div className="max-w-md mx-auto px-4 pt-12">
          <div className="glass-panel p-8 rounded-3xl border border-slate-800 space-y-6">
            <div className="text-center">
              <h2 className="text-xl font-bold">Akses Admin E-Gov</h2>
              <p className="text-xs text-slate-400">Masuk untuk mengelola postingan & permohonan</p>
            </div>

            {err && <div className="p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-xs text-center">{err}</div>}

            <form onSubmit={handleLogin} className="space-y-4 text-xs">
              <div>
                <label className="block mb-1 font-medium">Email Admin</label>
                <input required type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="admin@siraman.id" />
              </div>
              <div>
                <label className="block mb-1 font-medium">Password</label>
                <input required type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="••••••••" />
              </div>
              <button type="submit" className="w-full py-3.5 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-bold transition">
                Masuk Dashboard Admin
              </button>
            </form>
          </div>
        </div>
      );
    }

    // --- VIEW 8: FULL DASHBOARD ADMIN ---
    function AdminPanel({ berita, layanan, saran, fetchData }) {
      const [tab, setTab] = useState('layanan');

      // State Form Berita
      const [judul, setJudul] = useState('');
      const [isi, setIsi] = useState('');
      const [kategori, setKategori] = useState('Pengumuman');
      const [foto, setFoto] = useState(null);
      const [loading, setLoading] = useState(false);

      const handleAddBerita = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          let base64Text = '';
          if (foto) base64Text = await convertFileToBase64(foto);

          await addDoc(collection(db, "berita"), {
            judul, isi, kategori, imageUrl: base64Text, timestamp: Date.now()
          });

          setJudul(''); setIsi(''); setFoto(null);
          await fetchData();
          alert("Berita berhasil dipublikasikan!");
        } catch (e) {
          alert("Gagal posting berita.");
        } finally {
          setLoading(false);
        }
      };

      const handleDeleteBerita = async (id) => {
        if (confirm("Hapus berita ini dari portal?")) {
          await deleteDoc(doc(db, "berita", id));
          fetchData();
        }
      };

      const handleUpdateStatusLayanan = async (id, statusBaru) => {
        await updateDoc(doc(db, "layanan", id), { status: statusBaru });
        fetchData();
      };

      return (
        <div className="max-w-7xl mx-auto px-4 pt-4 space-y-6">
          <div className="flex flex-wrap gap-2 border-b border-slate-800 pb-4">
            <button onClick={()=>setTab('layanan')} className={`px-4 py-2 rounded-xl text-xs font-bold transition ${tab==='layanan'?'bg-brand-600 text-white':'glass-card text-slate-400'}`}>
              🛵 Antar-Jemput Berkas ({layanan.length})
            </button>
            <button onClick={()=>setTab('berita')} className={`px-4 py-2 rounded-xl text-xs font-bold transition ${tab==='berita'?'bg-brand-600 text-white':'glass-card text-slate-400'}`}>
              📝 Posting Berita ({berita.length})
            </button>
            <button onClick={()=>setTab('saran')} className={`px-4 py-2 rounded-xl text-xs font-bold transition ${tab==='saran'?'bg-brand-600 text-white':'glass-card text-slate-400'}`}>
              📥 Kritik & Saran ({saran.length})
            </button>
          </div>

          {/* TAB 1: ADMIN JEMPUT BERKAS */}
          {tab === 'layanan' && (
            <div className="space-y-4">
              <h3 className="font-bold text-lg">Daftar Permohonan & Penjemputan Berkas Warga</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {layanan.map(l => (
                  <div key={l.id} className="glass-card p-5 rounded-2xl border border-slate-800 space-y-3 text-xs">
                    <div className="flex justify-between items-start">
                      <div>
                        <h4 className="font-bold text-sm text-brand-400">{l.jenisSurat}</h4>
                        <p className="text-slate-300 font-semibold">{l.nama} (NIK: {l.nik})</p>
                        <p className="text-slate-400">Padukuhan: {l.padukuhan} | WA: <a href={`https://wa.me/${l.whatsapp}`} target="_blank" className="text-accent-400 underline">{l.whatsapp}</a></p>
                      </div>
                      <span className={`px-2.5 py-1 rounded-full text-[10px] font-bold ${l.status==='Menunggu Penjemputan'?'bg-yellow-500/20 text-yellow-400':'bg-accent-500/20 text-accent-400'}`}>
                        {l.status}
                      </span>
                    </div>

                    {l.catatan && <p className="p-3 bg-slate-900 rounded-xl text-slate-300">Patokan: {l.catatan}</p>}
                    
                    {l.lampiran && (
                      <div className="space-y-1">
                        <span className="text-[10px] text-slate-500">Lampiran Persyaratan:</span>
                        <img src={l.lampiran} className="h-28 rounded-lg object-cover border border-slate-800" />
                      </div>
                    )}

                    <div className="flex gap-2 pt-2 border-t border-slate-800">
                      <button onClick={()=>handleUpdateStatusLayanan(l.id, 'Sedang Dijemput Petugas')} className="px-3 py-1.5 rounded-lg bg-brand-600 text-white text-[11px] font-bold">
                        🛵 Jemput Berkas
                      </button>
                      <button onClick={()=>handleUpdateStatusLayanan(l.id, 'Selesai Diproses')} className="px-3 py-1.5 rounded-lg bg-accent-600 text-white text-[11px] font-bold">
                        ✅ Selesai
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* TAB 2: POSTING BERITA */}
          {tab === 'berita' && (
            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
              <div className="glass-panel p-6 rounded-2xl border border-slate-800 space-y-4 h-fit">
                <h3 className="font-bold text-base">Buat Artikel Berita Baru</h3>
                <form onSubmit={handleAddBerita} className="space-y-3 text-xs">
                  <div>
                    <label className="block mb-1">Judul Berita</label>
                    <input required type="text" value={judul} onChange={e=>setJudul(e.target.value)} className="w-full px-3 py-2.5 rounded-xl bg-slate-900 border border-slate-800 outline-none" />
                  </div>
                  <div>
                    <label className="block mb-1">Kategori</label>
                    <select value={kategori} onChange={e=>setKategori(e.target.value)} className="w-full px-3 py-2.5 rounded-xl bg-slate-900 border border-slate-800 outline-none">
                      <option value="Pengumuman">Pengumuman</option>
                      <option value="Pembangunan">Pembangunan</option>
                      <option value="Kegiatan">Kegiatan</option>
                    </select>
                  </div>
                  <div>
                    <label className="block mb-1">Upload Foto Artikel</label>
                    <input type="file" accept="image/*" onChange={e=>setFoto(e.target.files[0])} className="w-full text-slate-400 file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:bg-brand-600/20 file:text-brand-400 font-semibold" />
                  </div>
                  <div>
                    <label className="block mb-1">Isi Ringkasan Berita</label>
                    <textarea required rows="4" value={isi} onChange={e=>setIsi(e.target.value)} className="w-full px-3 py-2.5 rounded-xl bg-slate-900 border border-slate-800 outline-none"></textarea>
                  </div>
                  <button type="submit" disabled={loading} className="w-full py-3 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-bold transition">
                    {loading ? 'Memproses...' : 'Terbitkan Berita'}
                  </button>
                </form>
              </div>

              <div className="md:col-span-2 space-y-4">
                <h3 className="font-bold text-base">Kelola Berita Aktif</h3>
                <div className="space-y-3">
                  {berita.map(b => (
                    <div key={b.id} className="glass-card p-4 rounded-xl flex items-center justify-between gap-4 border border-slate-800">
                      <div className="flex items-center gap-3">
                        <img src={b.imageUrl || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=600&q=80'} className="w-14 h-14 rounded-lg object-cover" />
                        <div>
                          <h4 className="font-bold text-sm">{b.judul}</h4>
                          <span className="text-[10px] text-brand-400 uppercase font-semibold">{b.kategori}</span>
                        </div>
                      </div>
                      <button onClick={()=>handleDeleteBerita(b.id)} className="px-3 py-1.5 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white text-xs transition">
                        Hapus
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* TAB 3: KRITIK & SARAN */}
          {tab === 'saran' && (
            <div className="space-y-4">
              <h3 className="font-bold text-lg">Daftar Kritik & Saran Warga</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {saran.map(s => (
                  <div key={s.id} className="glass-card p-5 rounded-2xl border border-slate-800 space-y-2 text-xs">
                    <span className="font-bold text-brand-400">{s.nama}</span>
                    <p className="p-3 bg-slate-900 rounded-xl text-slate-300 leading-relaxed">{s.pesan}</p>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
