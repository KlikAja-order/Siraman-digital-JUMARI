<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siraman Digital - Portal Resmi & Aspirasi Warga</title>
  
  <!-- PWA Manifest Inline -->
  <link rel="manifest" href='data:application/manifest+json,{"name":"Siraman Digital","short_name":"Siraman","start_url":".","display":"standalone","background_color":"#0f172a","theme_color":"#2563eb"}' />

  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a'
            },
            accent: {
              500: '#f97316', 600: '#ea580c'
            }
          },
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>

  <!-- React 18 & Babel via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; }
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .dark .glass-card {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen transition-colors duration-300 custom-scrollbar">

  <div id="root"></div>

  <!-- React Application Script -->
  <script type="text/babel" data-type="module">
    // Firebase Modular SDK v10 (Pure Firestore & Auth)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🔑 KONFIGURASI FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyBJHvVWe9zT2mdku3s5TP_KyJEEn8XF6So",
      authDomain: "siraman-digital.firebaseapp.com",
      databaseURL: "https://siraman-digital-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "siraman-digital",
      storageBucket: "siraman-digital.firebasestorage.app",
      messagingSenderId: "834135841361",
      appId: "1:834135841361:web:27cc66fd8c1ec2d02b3670"
    };

    // Inisialisasi Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const { useState, useEffect } = React;

    // HELPER: Kompresi & Konversi Gambar File ke Text Base64
    const convertFileToBase64 = (file) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            // Kompres ukuran gambar agar muat di Firestore (max 1000px)
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 1000;
            const scaleFactor = MAX_WIDTH / img.width;
            
            if (img.width > MAX_WIDTH) {
              canvas.width = MAX_WIDTH;
              canvas.height = img.height * scaleFactor;
            } else {
              canvas.width = img.width;
              canvas.height = img.height;
            }

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            // Convert ke Teks Base64 kualitas JPG 0.7
            const base64String = canvas.toDataURL('image/jpeg', 0.7);
            resolve(base64String);
          };
        };
        reader.onerror = (error) => reject(error);
      });
    };

    // --- UTAMA: APP COMPONENT ---
    function App() {
      const [view, setView] = useState('public'); 
      const [user, setUser] = useState(null);
      const [darkMode, setDarkMode] = useState(true);
      
      const [berita, setBerita] = useState([]);
      const [aspirasi, setAspirasi] = useState([]);
      const [heroData, setHeroData] = useState({
        title: "Membangun Siraman Digital, Maju & Transparan",
        subtitle: "Pusat informasi, program kerja, dan kanal aspirasi warga Kelurahan Siraman.",
        bgUrl: "https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=1200&q=80"
      });

      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          if (currentUser && view === 'login') setView('admin');
        });
        return () => unsubscribe();
      }, [view]);

      useEffect(() => {
        fetchData();
      }, []);

      const fetchData = async () => {
        try {
          const beritaSnap = await getDocs(query(collection(db, "berita"), orderBy("createdAt", "desc")));
          const beritaList = beritaSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setBerita(beritaList);

          const aspirasiSnap = await getDocs(query(collection(db, "aspirasi"), orderBy("createdAt", "desc")));
          const aspirasiList = aspirasiSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setAspirasi(aspirasiList);
        } catch (err) {
          console.log("Menunggu sinkronisasi database...");
        }
      };

      return (
        <div className="min-h-screen flex flex-col">
          {/* NAVBAR */}
          <nav className="fixed top-0 w-full z-50 glass-card px-4 py-3 border-b border-slate-200/50 dark:border-slate-800/50">
            <div className="max-w-7xl mx-auto flex justify-between items-center">
              <div onClick={() => setView('public')} className="flex items-center gap-3 cursor-pointer">
                <div className="w-10 h-10 rounded-2xl bg-gradient-to-tr from-brand-600 to-accent-500 flex items-center justify-center text-white font-extrabold text-xl shadow-lg shadow-brand-500/30">
                  S
                </div>
                <div>
                  <h1 className="text-lg font-bold leading-none tracking-tight">Siraman<span className="text-brand-500">Digital</span></h1>
                  <span className="text-[10px] text-slate-500 dark:text-slate-400 font-medium tracking-wider uppercase">Kelurahan Siraman</span>
                </div>
              </div>

              <div className="flex items-center gap-3">
                <button 
                  onClick={() => setDarkMode(!darkMode)}
                  className="p-2.5 rounded-xl bg-slate-200/60 dark:bg-slate-800/80 hover:scale-105 transition active:scale-95 text-xs"
                >
                  {darkMode ? '☀️ Light' : '🌙 Dark'}
                </button>

                {user ? (
                  <div className="flex items-center gap-2">
                    <button 
                      onClick={() => setView(view === 'admin' ? 'public' : 'admin')}
                      className="px-4 py-2 rounded-xl bg-brand-600 hover:bg-brand-700 text-white text-xs font-semibold transition shadow-md shadow-brand-600/20"
                    >
                      {view === 'admin' ? '🌐 Lihat Web' : '⚙️ Dashboard Admin'}
                    </button>
                    <button 
                      onClick={() => signOut(auth)}
                      className="px-3 py-2 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white text-xs font-semibold transition"
                    >
                      Keluar
                    </button>
                  </div>
                ) : (
                  <button 
                    onClick={() => setView('login')}
                    className="px-4 py-2 rounded-xl bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 text-xs font-semibold hover:opacity-90 transition shadow-md"
                  >
                    Akses Admin
                  </button>
                )}
              </div>
            </div>
          </nav>

          {/* MAIN CONTAINER */}
          <main className="flex-grow pt-20">
            {view === 'public' && <PublicView heroData={heroData} berita={berita} fetchData={fetchData} />}
            {view === 'login' && <LoginView setView={setView} />}
            {view === 'admin' && user && (
              <AdminDashboard 
                heroData={heroData} 
                setHeroData={setHeroData} 
                berita={berita} 
                aspirasi={aspirasi} 
                fetchData={fetchData} 
              />
            )}
          </main>

          <footer className="border-t border-slate-200 dark:border-slate-800/80 py-8 text-center text-xs text-slate-500 dark:text-slate-400 bg-white/50 dark:bg-slate-950/50 backdrop-blur-md">
            <p>© 2026 Siraman Digital - Kelurahan Siraman. All rights reserved.</p>
          </footer>
        </div>
      );
    }

    // --- 1. TAMPILAN PUBLIK ---
    function PublicView({ heroData, berita, fetchData }) {
      const [formData, setFormData] = useState({ nama: '', padukuhan: '', hp: '', kategori: 'Infrastruktur', isi: '' });
      const [submitting, setSubmitting] = useState(false);
      const [msg, setMsg] = useState('');

      const handleAspirasiSubmit = async (e) => {
        e.preventDefault();
        setSubmitting(true);
        try {
          await addDoc(collection(db, "aspirasi"), {
            ...formData,
            status: "Baru",
            createdAt: serverTimestamp()
          });
          setMsg("✅ Terima kasih! Aspirasi Anda berhasil disimpan.");
          setFormData({ nama: '', padukuhan: '', hp: '', kategori: 'Infrastruktur', isi: '' });
          fetchData();
        } catch (err) {
          setMsg("❌ Gagal mengirim aspirasi.");
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <div className="space-y-16 pb-16">
          {/* HERO BANNER */}
          <section className="relative px-4 pt-8 pb-12 max-w-7xl mx-auto">
            <div 
              className="relative rounded-3xl overflow-hidden p-8 md:p-16 border border-slate-200/50 dark:border-slate-800 shadow-2xl bg-cover bg-center transition-all duration-500 min-h-[440px] flex items-center"
              style={{ backgroundImage: `linear-gradient(to right, rgba(15, 23, 42, 0.92), rgba(15, 23, 42, 0.65)), url('${heroData.bgUrl}')` }}
            >
              <div className="max-w-2xl text-white space-y-6">
                <span className="inline-block px-4 py-1.5 rounded-full bg-accent-500/20 text-accent-500 border border-accent-500/30 text-xs font-bold tracking-wider uppercase">
                  📢 Official Portal Kelurahan Siraman
                </span>
                <h1 className="text-3xl md:text-5xl font-black leading-tight tracking-tight">
                  {heroData.title}
                </h1>
                <p className="text-slate-300 text-sm md:text-base leading-relaxed">
                  {heroData.subtitle}
                </p>
                <div className="flex flex-wrap gap-4 pt-2">
                  <a href="#aspirasi" className="px-6 py-3.5 rounded-2xl bg-brand-600 hover:bg-brand-500 text-white font-semibold text-sm transition shadow-lg shadow-brand-600/30">
                    Kirim Aspirasi Warga
                  </a>
                  <a href="#berita" className="px-6 py-3.5 rounded-2xl bg-white/10 hover:bg-white/20 text-white border border-white/20 font-semibold text-sm transition backdrop-blur-md">
                    Baca Berita Terbaru
                  </a>
                </div>
              </div>
            </div>
          </section>

          {/* LIST BERITA */}
          <section id="berita" className="max-w-7xl mx-auto px-4">
            <div className="flex justify-between items-end mb-8">
              <div>
                <h2 className="text-2xl font-bold">Berita & Pengumuman</h2>
                <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">Informasi resmi seputar program dan kegiatan kelurahan</p>
              </div>
            </div>

            {berita.length === 0 ? (
              <div className="text-center py-12 glass-card rounded-3xl border border-dashed border-slate-300 dark:border-slate-800">
                <p className="text-sm text-slate-500">Belum ada berita dipublikasikan.</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {berita.map((item) => (
                  <div key={item.id} className="glass-card rounded-3xl overflow-hidden hover:scale-[1.02] transition duration-300 shadow-xl flex flex-col">
                    <img src={item.imageUrl || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=600&q=80'} alt={item.judul} className="h-48 w-full object-cover" />
                    <div className="p-6 flex flex-col flex-grow space-y-3">
                      <span className="text-[10px] font-bold text-brand-500 uppercase tracking-wider">{item.kategori || 'Pengumuman'}</span>
                      <h3 className="font-bold text-base line-clamp-2">{item.judul}</h3>
                      <p className="text-xs text-slate-500 dark:text-slate-400 line-clamp-3 leading-relaxed">{item.isi}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </section>

          {/* FORM ASPIRASI */}
          <section id="aspirasi" className="max-w-3xl mx-auto px-4">
            <div className="glass-card p-8 md:p-10 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-800">
              <div className="text-center space-y-2 mb-8">
                <h2 className="text-2xl font-bold">Kanal Aspirasi Warga</h2>
                <p className="text-xs text-slate-500 dark:text-slate-400">Sampaikan saran atau laporan kamu langsung kepada perangkat desa.</p>
              </div>

              {msg && <div className="mb-6 p-4 rounded-2xl bg-brand-500/10 border border-brand-500/20 text-brand-500 text-xs font-medium text-center">{msg}</div>}

              <form onSubmit={handleAspirasiSubmit} className="space-y-4 text-xs">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className="block font-medium mb-1">Nama Lengkap *</label>
                    <input required type="text" value={formData.nama} onChange={e => setFormData({...formData, nama: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent outline-none focus:ring-2 focus:ring-brand-500" placeholder="Masukkan nama" />
                  </div>
                  <div>
                    <label className="block font-medium mb-1">Padukuhan *</label>
                    <input required type="text" value={formData.padukuhan} onChange={e => setFormData({...formData, padukuhan: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent outline-none focus:ring-2 focus:ring-brand-500" placeholder="Contoh: Seneng" />
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className="block font-medium mb-1">Nomor WhatsApp</label>
                    <input type="text" value={formData.hp} onChange={e => setFormData({...formData, hp: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent outline-none focus:ring-2 focus:ring-brand-500" placeholder="0812xxxxxxx" />
                  </div>
                  <div>
                    <label className="block font-medium mb-1">Kategori</label>
                    <select value={formData.kategori} onChange={e => setFormData({...formData, kategori: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent dark:bg-slate-900 outline-none">
                      <option value="Infrastruktur">Infrastruktur & Jalan</option>
                      <option value="Pelayanan">Pelayanan Publik</option>
                      <option value="Kesehatan">Kesehatan & Sosial</option>
                      <option value="UMKM">Pertanian & UMKM</option>
                      <option value="Lainnya">Lainnya</option>
                    </select>
                  </div>
                </div>

                <div>
                  <label className="block font-medium mb-1">Isi Aspirasi *</label>
                  <textarea required rows="4" value={formData.isi} onChange={e => setFormData({...formData, isi: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent outline-none focus:ring-2 focus:ring-brand-500" placeholder="Tuliskan isi aspirasi..."></textarea>
                </div>

                <button type="submit" disabled={submitting} className="w-full py-3.5 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-semibold shadow-lg shadow-brand-600/30 transition disabled:opacity-50">
                  {submitting ? 'Mengirim Data...' : 'Kirim Aspirasi'}
                </button>
              </form>
            </div>
          </section>
        </div>
      );
    }

    // --- 2. LOGIN ADMIN ---
    function LoginView({ setView }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [err, setErr] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        setErr('');
        try {
          await signInWithEmailAndPassword(auth, email, password);
          setView('admin');
        } catch (error) {
          setErr("Login gagal. Periksa email & password.");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="max-w-md mx-auto px-4 pt-16 pb-24">
          <div className="glass-card p-8 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-800 space-y-6">
            <div className="text-center space-y-1">
              <h2 className="text-xl font-bold">Login Administrator</h2>
              <p className="text-xs text-slate-500">Panel khusus pengurus Siraman Digital</p>
            </div>

            {err && <div className="p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-500 text-xs text-center">{err}</div>}

            <form onSubmit={handleLogin} className="space-y-4 text-xs">
              <div>
                <label className="block mb-1 font-medium">Email Admin</label>
                <input required type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent outline-none focus:ring-2 focus:ring-brand-500" placeholder="admin@siraman.id" />
              </div>

              <div>
                <label className="block mb-1 font-medium">Password</label>
                <input required type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent outline-none focus:ring-2 focus:ring-brand-500" placeholder="••••••••" />
              </div>

              <button type="submit" disabled={loading} className="w-full py-3.5 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-semibold transition shadow-lg shadow-brand-600/30">
                {loading ? 'Memverifikasi...' : 'Masuk Dashboard Admin'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // --- 3. DASHBOARD ADMIN (KONVERSI FOTO KE TEXT BASE64) ---
    function AdminDashboard({ heroData, setHeroData, berita, aspirasi, fetchData }) {
      const [tab, setTab] = useState('berita');
      
      // State Berita
      const [judul, setJudul] = useState('');
      const [isi, setIsi] = useState('');
      const [kategori, setKategori] = useState('Pengumuman');
      const [imageFile, setImageFile] = useState(null);
      const [processing, setProcessing] = useState(false);

      // State Hero Background
      const [bgFile, setBgFile] = useState(null);
      const [bgTitle, setBgTitle] = useState(heroData.title);

      // PROSES SIMPAN BERITA (Ubah File Foto Jadi Teks Base64)
      const handleAddBerita = async (e) => {
        e.preventDefault();
        setProcessing(true);
        try {
          let base64Text = 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=600&q=80';
          
          if (imageFile) {
            base64Text = await convertFileToBase64(imageFile);
          }

          await addDoc(collection(db, "berita"), {
            judul, 
            isi, 
            kategori, 
            imageUrl: base64Text, // Menyimpan teks string Base64 langsung di Firestore
            createdAt: serverTimestamp()
          });

          setJudul(''); setIsi(''); setImageFile(null);
          fetchData();
          alert("Berita & foto berhasil dikonversi ke teks dan disimpan ke Firestore!");
        } catch (err) {
          alert("Gagal memproses gambar. Pastikan ukuran foto tidak terlalu besar.");
        } finally {
          setProcessing(false);
        }
      };

      // PROSES SIMPAN BANNER HERO (Ubah Foto Banner Jadi Teks Base64)
      const handleUpdateHero = async (e) => {
        e.preventDefault();
        setProcessing(true);
        try {
          let base64Bg = heroData.bgUrl;
          if (bgFile) {
            base64Bg = await convertFileToBase64(bgFile);
          }

          setHeroData({ ...heroData, title: bgTitle, bgUrl: base64Bg });
          alert("Background Hero berhasil diperbarui!");
        } catch (err) {
          alert("Gagal mengompres background.");
        } finally {
          setProcessing(false);
        }
      };

      // Hapus Berita
      const handleDeleteBerita = async (id) => {
        if (confirm("Hapus berita ini dari database?")) {
          await deleteDoc(doc(db, "berita", id));
          fetchData();
        }
      };

      return (
        <div className="max-w-7xl mx-auto px-4 pb-20">
          <div className="flex flex-wrap gap-2 mb-8 border-b border-slate-200 dark:border-slate-800 pb-4">
            <button onClick={() => setTab('berita')} className={`px-4 py-2 rounded-xl text-xs font-semibold transition ${tab === 'berita' ? 'bg-brand-600 text-white' : 'glass-card'}`}>
              📝 Posting Berita ({berita.length})
            </button>
            <button onClick={() => setTab('hero')} className={`px-4 py-2 rounded-xl text-xs font-semibold transition ${tab === 'hero' ? 'bg-brand-600 text-white' : 'glass-card'}`}>
              🖼️ Upload Background Hero
            </button>
            <button onClick={() => setTab('aspirasi')} className={`px-4 py-2 rounded-xl text-xs font-semibold transition ${tab === 'aspirasi' ? 'bg-brand-600 text-white' : 'glass-card'}`}>
              📥 Aspirasi Warga ({aspirasi.length})
            </button>
          </div>

          {/* TAB 1: UPLOAD FOTO BERITA VIA BASE64 */}
          {tab === 'berita' && (
            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
              <div className="glass-card p-6 rounded-3xl h-fit border border-slate-200 dark:border-slate-800 space-y-4">
                <h3 className="font-bold text-base">Posting Berita</h3>
                <form onSubmit={handleAddBerita} className="space-y-3 text-xs">
                  <div>
                    <label className="block mb-1 font-medium">Judul Berita</label>
                    <input required type="text" value={judul} onChange={e => setJudul(e.target.value)} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent outline-none focus:ring-2 focus:ring-brand-500" placeholder="Judul artikel..." />
                  </div>
                  <div>
                    <label className="block mb-1 font-medium">Kategori</label>
                    <select value={kategori} onChange={e => setKategori(e.target.value)} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent dark:bg-slate-900 outline-none">
                      <option value="Pengumuman">Pengumuman</option>
                      <option value="Pembangunan">Pembangunan</option>
                      <option value="Kegiatan">Kegiatan Warga</option>
                    </select>
                  </div>
                  <div>
                    <label className="block mb-1 font-medium">Pilih File Foto (Otomatis Di-convert Ke Teks)</label>
                    <input type="file" accept="image/*" onChange={e => setImageFile(e.target.files[0])} className="w-full text-xs text-slate-500 file:mr-2 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-brand-500/10 file:text-brand-500 font-semibold" />
                  </div>
                  <div>
                    <label className="block mb-1 font-medium">Isi Berita</label>
                    <textarea required rows="4" value={isi} onChange={e => setIsi(e.target.value)} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent outline-none focus:ring-2 focus:ring-brand-500" placeholder="Ringkasan berita..."></textarea>
                  </div>
                  <button type="submit" disabled={processing} className="w-full py-3 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-semibold transition disabled:opacity-50">
                    {processing ? 'Mengompres & Menyimpan Foto...' : 'Terbitkan Berita'}
                  </button>
                </form>
              </div>

              <div className="md:col-span-2 space-y-4">
                <h3 className="font-bold text-base">Daftar Berita Aktif</h3>
                <div className="space-y-3">
                  {berita.map(item => (
                    <div key={item.id} className="glass-card p-4 rounded-2xl flex items-center justify-between gap-4 border border-slate-200 dark:border-slate-800">
                      <div className="flex items-center gap-4">
                        <img src={item.imageUrl} className="w-16 h-16 rounded-xl object-cover" />
                        <div>
                          <h4 className="font-bold text-sm">{item.judul}</h4>
                          <span className="text-[10px] text-brand-500 font-semibold uppercase">{item.kategori}</span>
                        </div>
                      </div>
                      <button onClick={() => handleDeleteBerita(item.id)} className="p-2 rounded-xl bg-red-500/10 text-red-500 text-xs font-semibold hover:bg-red-500 hover:text-white transition">
                        Hapus
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* TAB 2: UPLOAD BACKGROUND HERO VIA BASE64 */}
          {tab === 'hero' && (
            <div className="max-w-xl mx-auto glass-card p-8 rounded-3xl border border-slate-200 dark:border-slate-800 space-y-6">
              <h3 className="font-bold text-lg">Ganti Background Hero Banner</h3>
              <form onSubmit={handleUpdateHero} className="space-y-4 text-xs">
                <div>
                  <label className="block mb-1 font-medium">Judul Utama</label>
                  <input type="text" value={bgTitle} onChange={e => setBgTitle(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent outline-none focus:ring-2 focus:ring-brand-500" />
                </div>
                <div>
                  <label className="block mb-1 font-medium">Pilih Foto Background dari HP / PC</label>
                  <input type="file" accept="image/*" onChange={e => setBgFile(e.target.files[0])} className="w-full text-xs text-slate-500 file:mr-2 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-brand-500/10 file:text-brand-500 font-semibold" />
                </div>
                <button type="submit" disabled={processing} className="w-full py-3.5 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-semibold transition disabled:opacity-50">
                  {processing ? 'Memproses Foto...' : 'Simpan Background Baru'}
                </button>
              </form>
            </div>
          )}

          {/* TAB 3: ASPIRASI */}
          {tab === 'aspirasi' && (
            <div className="space-y-4">
              <h3 className="font-bold text-base">Kotak Masuk Aspirasi Masyarakat</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {aspirasi.map(item => (
                  <div key={item.id} className="glass-card p-6 rounded-3xl space-y-3 border border-slate-200 dark:border-slate-800 text-xs">
                    <div className="flex justify-between items-start">
                      <div>
                        <h4 className="font-bold text-sm">{item.nama}</h4>
                        <p className="text-[11px] text-slate-500">Padukuhan {item.padukuhan} • WA: {item.hp || '-'}</p>
                      </div>
                      <span className="px-3 py-1 rounded-full bg-brand-500/10 text-brand-500 font-semibold text-[10px] uppercase">
                        {item.kategori}
                      </span>
                    </div>
                    <p className="text-slate-600 dark:text-slate-300 leading-relaxed bg-slate-100/50 dark:bg-slate-900/50 p-3.5 rounded-2xl">{item.isi}</p>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
