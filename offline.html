<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koneksi Terputus - Siraman Digital</title>
  <link rel="stylesheet" href="/assets/css/variables.css" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 1.5rem;
    }
    .offline-card {
      max-width: 480px;
      padding: 2.5rem 1.5rem;
    }
    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="glass-panel card offline-card fade-in">
    <div class="offline-icon">📡</div>
    <h2 style="margin-bottom: 0.5rem;">Anda Sedang Offline</h2>
    <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
      Koneksi internet Anda tampaknya terputus. Mohon periksa kembali jaringan Wi-Fi atau data seluler Anda untuk mengakses informasi terbaru Kelurahan Siraman.
    </p>
    <button onclick="window.location.reload()" class="btn btn-primary" style="width: 100%;">
      🔄 Coba Muat Ulang
    </button>
  </div>
</body>
</html>
