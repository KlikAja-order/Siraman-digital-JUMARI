<!DOCTYPE html>
<html lang="id" class="dark scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Gov Siraman by Jumari - Portal Resmi Pelayanan & Transparansi Kelurahan</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f9ff', 100: '#e0f2fe', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e'
            },
            accent: {
              400: '#34d399', 500: '#10b981', 600: '#059669'
            },
            darkbg: '#080c14'
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #080c14; color: #f8fafc; }
    .glass-panel {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glass-card {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #0284c7; border-radius: 10px; }
  </style>
</head>
<body class="min-h-screen custom-scrollbar antialiased">

  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJHvVWe9zT2mdku3s5TP_KyJEEn8XF6So",
      authDomain: "siraman-digital.firebaseapp.com",
      databaseURL: "https://siraman-digital-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "siraman-digital",
      storageBucket: "siraman-digital.firebasestorage.app",
      messagingSenderId: "834135841361",
      appId: "1:834135841361:web:27cc66fd8c1ec2d02b3670"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const { useState, useEffect } = React;

    // Helper: Compress Image to Base64
    const convertFileToBase64 = (file) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 900;
            let width = img.width;
            let height = img.height;

            if (width > MAX_WIDTH) {
              height = Math.round((height * MAX_WIDTH) / width);
              width = MAX_WIDTH;
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
          };
          img.onerror = (err) => reject(err);
        };
        reader.onerror = (error) => reject(error);
      });
    };

    function App() {
      const [view, setView] = useState('home'); 
      const [user, setUser] = useState(null);
      
      const [berita, setBerita] = useState([]);
      const [layanan, setLayanan] = useState([]);
      const [saran, setSaran] = useState([]);
      const [loadingData, setLoadingData] = useState(true);

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        fetchData();
      }, []);

      // PERBAIKAN UTAMA: Penanganan Fetch Data Berita & Realtime Safe Array
      const fetchData = async () => {
        setLoadingData(true);
        try {
          // Fetch Berita
          const beritaSnap = await getDocs(collection(db, "berita"));
          const beritaList = beritaSnap.docs.map(d => ({ id: d.id, ...d.data() }));
          beritaList.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
          setBerita(beritaList);

          // Fetch Permohonan Layanan
          const layananSnap = await getDocs(collection(db, "layanan"));
          const layananList = layananSnap.docs.map(d => ({ id: d.id, ...d.data() }));
          layananList.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
          setLayanan(layananList);

          // Fetch Saran
          const saranSnap = await getDocs(collection(db, "saran"));
          const saranList = saranSnap.docs.map(d => ({ id: d.id, ...d.data() }));
          saranList.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
          setSaran(saranList);

        } catch (e) {
          console.error("Gagal sinkronisasi data dari Firestore:", e);
        } finally {
          setLoadingData(false);
        }
      };

      return (
        <div className="min-h-screen flex flex-col bg-[#080c14] text-slate-100">
          {/* Header Navigation */}
          <nav className="fixed top-0 w-full z-50 glass-panel px-4 py-3 border-b border-slate-800">
            <div className="max-w-7xl mx-auto flex justify-between items-center">
              <div onClick={() => setView('home')} className="flex items-center gap-3 cursor-pointer">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-600 to-accent-500 flex items-center justify-center text-white font-black text-lg shadow-lg shadow-brand-500/20">
                  EG
                </div>
                <div>
                  <h1 className="text-base font-bold leading-none tracking-tight">E-Gov Siraman</h1>
                  <p className="text-[10px] text-slate-400 font-medium">Official Portal <span className="text-brand-400 font-semibold">by Jumari</span></p>
                </div>
              </div>

              {/* Navigation Menu */}
              <div className="hidden lg:flex items-center gap-1 text-xs font-semibold text-slate-300">
                <button onClick={() => setView('home')} className={`px-3.5 py-2 rounded-xl transition ${view==='home'?'bg-brand-600/20 text-brand-400 border border-brand-500/30': 'hover:text-white hover:bg-slate-800/50'}`}>Beranda</button>
                <button onClick={() => setView('layanan')} className={`px-3.5 py-2 rounded-xl transition ${view==='layanan'?'bg-brand-600/20 text-brand-400 border border-brand-500/30': 'hover:text-white hover:bg-slate-800/50'}`}>📦 Jemput Berkas</button>
                <button onClick={() => setView('berita')} className={`px-3.5 py-2 rounded-xl transition ${view==='berita'?'bg-brand-600/20 text-brand-400 border border-brand-500/30': 'hover:text-white hover:bg-slate-800/50'}`}>📰 Berita Desa</button>
                <button onClick={() => setView('transparansi')} className={`px-3.5 py-2 rounded-xl transition ${view==='transparansi'?'bg-brand-600/20 text-brand-400 border border-brand-500/30': 'hover:text-white hover:bg-slate-800/50'}`}>📊 Keuangan APBD</button>
                <button onClick={() => setView('kependudukan')} className={`px-3.5 py-2 rounded-xl transition ${view==='kependudukan'?'bg-brand-600/20 text-brand-400 border border-brand-500/30': 'hover:text-white hover:bg-slate-800/50'}`}>👥 Data Penduduk</button>
                <button onClick={() => setView('peta')} className={`px-3.5 py-2 rounded-xl transition ${view==='peta'?'bg-brand-600/20 text-brand-400 border border-brand-500/30': 'hover:text-white hover:bg-slate-800/50'}`}>🗺️ Peta Padukuhan</button>
                <button onClick={() => setView('saran')} className={`px-3.5 py-2 rounded-xl transition ${view==='saran'?'bg-brand-600/20 text-brand-400 border border-brand-500/30': 'hover:text-white hover:bg-slate-800/50'}`}>💬 Kritik & Saran</button>
              </div>

              {/* Admin Button Kecil Tersembunyi */}
              <div className="flex items-center gap-2">
                {user ? (
                  <div className="flex items-center gap-2">
                    <button onClick={() => setView('admin')} className="px-3 py-1.5 rounded-lg bg-brand-600 hover:bg-brand-500 text-white text-xs font-bold transition shadow-lg shadow-brand-600/20">
                      ⚙️ Dashboard Admin
                    </button>
                    <button onClick={() => signOut(auth)} className="px-2.5 py-1.5 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white text-xs transition">
                      Keluar
                    </button>
                  </div>
                ) : (
                  <button 
                    onClick={() => setView('login')} 
                    title="Akses Sistem Admin" 
                    className="p-2 rounded-xl text-slate-600 hover:text-slate-300 hover:bg-slate-800/50 transition"
                  >
                    🔐
                  </button>
                )}
              </div>
            </div>
          </nav>

          {/* Body Dynamic Content */}
          <main className="flex-grow pt-24 pb-12">
            {view === 'home' && <HomeView setView={setView} berita={berita} loading={loadingData} />}
            {view === 'layanan' && <LayananJemputView fetchData={fetchData} />}
            {view === 'berita' && <BeritaView berita={berita} loading={loadingData} />}
            {view === 'transparansi' && <TransparansiKeuanganView />}
            {view === 'kependudukan' && <DataPendudukView />}
            {view === 'peta' && <PetaPadukuhanView />}
            {view === 'saran' && <KritikSaranView fetchData={fetchData} />}
            {view === 'login' && <LoginAdminView setView={setView} />}
            {view === 'admin' && user && (
              <AdminPanel 
                berita={berita} 
                layanan={layanan} 
                saran={saran} 
                fetchData={fetchData} 
              />
            )}
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800/80 py-8 text-center text-xs text-slate-500 bg-slate-950/60 backdrop-blur-md">
            <div className="max-w-7xl mx-auto px-4 space-y-2">
              <p className="font-semibold text-slate-400">E-Gov Siraman Digital Services © 2026 by Jumari</p>
              <p className="text-[11px] text-slate-600">Sistem Informasi Birokrasi, Antar-Jemput Berkas Kependudukan, & Transparansi Anggaran Desa Siraman, Gunungkidul.</p>
            </div>
          </footer>
        </div>
      );
    }
        // --- VIEW 1: HOME / BERANDA ---
    function HomeView({ setView, berita, loading }) {
      return (
        <div className="space-y-12 max-w-7xl mx-auto px-4">
          {/* Hero Banner */}
          <div className="glass-panel rounded-3xl p-8 md:p-14 border border-slate-800 relative overflow-hidden flex items-center justify-between">
            <div className="max-w-2xl z-10 space-y-6">
              <span className="px-3.5 py-1.5 rounded-full bg-brand-500/10 border border-brand-500/20 text-brand-400 font-semibold text-xs tracking-wide inline-flex items-center gap-2">
                <span>🚀</span> Solusi Inovasi Pelayanan Publik by Jumari
              </span>
              <h1 className="text-3xl md:text-5xl font-extrabold leading-tight tracking-tight">
                Layanan Birokrasi Cepat, Transparan & Bebas Ribet.
              </h1>
              <p className="text-slate-400 text-sm leading-relaxed">
                Portal resmi E-Gov Kelurahan Siraman. Tidak perlu bolak-balik ke kantor desa. Ajukan surat dari rumah, petugas lapangan siap datang ke rumah Anda untuk menjemput berkas fisik!
              </p>
              <div className="flex flex-wrap gap-3 pt-2">
                <button onClick={() => setView('layanan')} className="px-6 py-3.5 rounded-xl bg-brand-600 hover:bg-brand-500 text-white text-xs font-bold shadow-lg shadow-brand-600/30 transition flex items-center gap-2">
                  <span>📦</span> Buat Permohonan / Jemput Berkas
                </button>
                <button onClick={() => setView('transparansi')} className="px-6 py-3.5 rounded-xl bg-slate-800/80 hover:bg-slate-700 text-slate-200 text-xs font-bold border border-slate-700 transition flex items-center gap-2">
                  <span>📊</span> Cek Keuangan APBD Desa
                </button>
              </div>
            </div>
          </div>

          {/* Grid Fitur Unggulan */}
          <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div className="glass-card p-6 rounded-2xl border border-slate-800 space-y-2">
              <div className="w-10 h-10 rounded-xl bg-brand-500/10 text-brand-400 flex items-center justify-center font-bold text-lg">🛵</div>
              <h3 className="font-bold text-sm text-slate-200">Jemput Berkas Layangan</h3>
              <p className="text-xs text-slate-400 leading-relaxed">Persyaratan administrasi dijemput langsung oleh petugas ke rumah warga.</p>
            </div>
            <div className="glass-card p-6 rounded-2xl border border-slate-800 space-y-2">
              <div className="w-10 h-10 rounded-xl bg-accent-500/10 text-accent-400 flex items-center justify-center font-bold text-lg">💰</div>
              <h3 className="font-bold text-sm text-slate-200">Transparansi Keuangan</h3>
              <p className="text-xs text-slate-400 leading-relaxed">Publikasi riil penggunaan dana desa dan anggaran kelurahan secara terbuka.</p>
            </div>
            <div className="glass-card p-6 rounded-2xl border border-slate-800 space-y-2">
              <div className="w-10 h-10 rounded-xl bg-purple-500/10 text-purple-400 flex items-center justify-center font-bold text-lg">📈</div>
              <h3 className="font-bold text-sm text-slate-200">Data Penduduk Akurat</h3>
              <p className="text-xs text-slate-400 leading-relaxed">Statistik lengkap demografi warga dari tingkatan usia hingga kelompok gender.</p>
            </div>
            <div className="glass-card p-6 rounded-2xl border border-slate-800 space-y-2">
              <div className="w-10 h-10 rounded-xl bg-amber-500/10 text-amber-400 flex items-center justify-center font-bold text-lg">🗺️</div>
              <h3 className="font-bold text-sm text-slate-200">Peta Wilayah Desa</h3>
              <p className="text-xs text-slate-400 leading-relaxed">Informasi geografis padukuhan dan pemetaan zonasi di Kelurahan Siraman.</p>
            </div>
          </div>

          {/* Preview Berita Terbaru */}
          <div className="space-y-4">
            <div className="flex justify-between items-end">
              <div>
                <h2 className="text-xl font-bold">Kabar Siraman Terbaru</h2>
                <p className="text-xs text-slate-400">Informasi dan pengumuman resmi dari kelurahan</p>
              </div>
              <button onClick={() => setView('berita')} className="text-xs text-brand-400 hover:underline font-semibold">
                Lihat Semua Berita →
              </button>
            </div>

            {loading ? (
              <div className="text-center py-8 text-xs text-slate-500">Memuat berita terbaru...</div>
            ) : berita.length === 0 ? (
              <div className="p-8 rounded-2xl glass-card text-center text-xs text-slate-500 border border-slate-800">
                Belum ada berita terpublikasi.
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {berita.slice(0, 3).map(b => (
                  <div key={b.id} className="glass-card rounded-2xl overflow-hidden border border-slate-800 flex flex-col">
                    <img src={b.imageUrl || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=600&q=80'} className="h-40 w-full object-cover" />
                    <div className="p-5 space-y-2 flex-grow">
                      <span className="text-[10px] font-bold text-brand-400 uppercase tracking-wider">{b.kategori || 'Pengumuman'}</span>
                      <h3 className="font-bold text-sm line-clamp-2 text-slate-100">{b.judul}</h3>
                      <p className="text-xs text-slate-400 line-clamp-3 leading-relaxed">{b.isi}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- VIEW 2: LAYANAN JEMPUT BERKAS (SOLUSI BY JUMARI) ---
    function LayananJemputView({ fetchData }) {
      const [formData, setFormData] = useState({
        nama: '', nik: '', padukuhan: '', whatsapp: '', jenisSurat: 'Surat Keterangan Usaha (SKU)', catatan: '', opsiJemput: true
      });
      const [filePersyaratan, setFilePersyaratan] = useState(null);
      const [loading, setLoading] = useState(false);
      const [success, setSuccess] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          let base64File = '';
          if (filePersyaratan) {
            base64File = await convertFileToBase64(filePersyaratan);
          }

          await addDoc(collection(db, "layanan"), {
            ...formData,
            lampiran: base64File,
            status: "Menunggu Penjemputan",
            timestamp: Date.now()
          });

          setSuccess(true);
          setFormData({ nama: '', nik: '', padukuhan: '', whatsapp: '', jenisSurat: 'Surat Keterangan Usaha (SKU)', catatan: '', opsiJemput: true });
          setFilePersyaratan(null);
          fetchData();
        } catch (err) {
          alert("Gagal mengirim permohonan berkas. Periksa koneksi internet Anda.");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="max-w-3xl mx-auto px-4">
          <div className="glass-panel p-8 md:p-10 rounded-3xl border border-slate-800 space-y-6">
            <div>
              <span className="text-xs font-bold text-brand-400 uppercase tracking-widest">Solusi Inovatif Administrasi by Jumari</span>
              <h2 className="text-2xl font-bold mt-1">Layanan Antar-Jemput Berkas Surat</h2>
              <p className="text-xs text-slate-400 mt-1">Masyarakat cukup mengisi formulir & unggah persyaratan. Petugas lapangan akan datang menjemput berkas asli ke rumah Anda!</p>
            </div>

            {success && (
              <div className="p-4 rounded-2xl bg-accent-500/10 border border-accent-500/30 text-accent-400 text-xs font-medium space-y-1">
                <p className="font-bold">✅ Permohonan Berhasil Dikirim!</p>
                <p className="text-slate-300">Data Anda telah dicatat di sistem. Petugas lapangan kelurahan akan menghubungi nomor WhatsApp Anda untuk mengonfirmasi jadwal penjemputan berkas ke rumah.</p>
              </div>
            )}

            <form onSubmit={handleSubmit} className="space-y-4 text-xs">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label className="block mb-1 font-medium text-slate-300">Nama Lengkap Pemohon *</label>
                  <input required type="text" value={formData.nama} onChange={e=>setFormData({...formData, nama:e.target.value})} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="Sesuai KTP" />
                </div>
                <div>
                  <label className="block mb-1 font-medium text-slate-300">NIK (Nomor Induk Kependudukan) *</label>
                  <input required type="number" value={formData.nik} onChange={e=>setFormData({...formData, nik:e.target.value})} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="16 Digit NIK" />
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label className="block mb-1 font-medium text-slate-300">Padukuhan / RT / RW *</label>
                  <input required type="text" value={formData.padukuhan} onChange={e=>setFormData({...formData, padukuhan:e.target.value})} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="Contoh: Seneng, RT 02 / RW 05" />
                </div>
                <div>
                  <label className="block mb-1 font-medium text-slate-300">Nomor WhatsApp Aktif *</label>
                  <input required type="text" value={formData.whatsapp} onChange={e=>setFormData({...formData, whatsapp:e.target.value})} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="08xxxxxxxxxx" />
                </div>
              </div>

              <div>
                <label className="block mb-1 font-medium text-slate-300">Jenis Dokumen / Surat Yang Diajukan *</label>
                <select value={formData.jenisSurat} onChange={e=>setFormData({...formData, jenisSurat:e.target.value})} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500 text-slate-200">
                  <option value="Surat Keterangan Usaha (SKU)">Surat Keterangan Usaha (SKU)</option>
                  <option value="Surat Keterangan Tidak Mampu (SKTM)">Surat Keterangan Tidak Mampu (SKTM)</option>
                  <option value="Pengantar Kartu Keluarga / KTP Baru">Pengantar Kartu Keluarga / KTP Baru</option>
                  <option value="Surat Keterangan Domisili">Surat Keterangan Domisili</option>
                  <option value="Surat Keterangan Kelahiran / Kematian">Surat Keterangan Kelahiran / Kematian</option>
                  <option value="Surat Keterangan Pindah Penduduk">Surat Keterangan Pindah Penduduk</option>
                </select>
              </div>

              <div>
                <label className="block mb-1 font-medium text-slate-300">Unggah Foto Dokumen Persyaratan (KTP / KK / Surat Pengantar RT)</label>
                <input type="file" accept="image/*" onChange={e=>setFilePersyaratan(e.target.files[0])} className="w-full text-slate-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:bg-brand-600/20 file:text-brand-400 font-semibold cursor-pointer" />
              </div>

              <div>
                <label className="block mb-1 font-medium text-slate-300">Catatan / Patokan Lokasi Rumah</label>
                <textarea rows="3" value={formData.catatan} onChange={e=>setFormData({...formData, catatan:e.target.value})} className="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="Tuliskan patokan lokasi rumah atau instruksi penjemputan..."></textarea>
              </div>

              <div className="p-4 rounded-xl bg-slate-900/80 border border-slate-800 flex items-center gap-3">

    // --- VIEW 9: DASHBOARD CONTROL PANEL ADMIN ---
    function AdminPanel({ berita, layanan, saran, fetchData }) {
      const [activeTab, setActiveTab] = useState('berita');

      // Form State Berita Baru
      const [judul, setJudul] = useState('');
      const [kategori, setKategori] = useState('Pengumuman');
      const [isi, setIsi] = useState('');
      const [gambarFile, setGambarFile] = useState(null);
      const [posting, setPosting] = useState(false);

      // Handle Buat Berita Baru
      const handleCreateBerita = async (e) => {
        e.preventDefault();
        setPosting(true);
        try {
          let base64Image = '';
          if (gambarFile) {
            base64Image = await convertFileToBase64(gambarFile);
          }

          await addDoc(collection(db, "berita"), {
            judul,
            kategori,
            isi,
            imageUrl: base64Image,
            timestamp: Date.now()
          });

          setJudul(''); setIsi(''); setGambarFile(null);
          alert("✅ Berita berhasil terpublikasi ke dashboard warga!");
          fetchData();
        } catch (err) {
          alert("❌ Gagal memublikasikan berita: " + err.message);
        } finally {
          setPosting(false);
        }
      };

      // Handle Hapus Berita
      const handleDeleteBerita = async (id) => {
        if (confirm("Apakah Anda yakin ingin menghapus berita ini?")) {
          try {
            await deleteDoc(doc(db, "berita", id));
            fetchData();
          } catch (e) {
            alert("Gagal menghapus berita.");
          }
        }
      };

      // Handle Update Status Jemput Berkas
      const handleUpdateStatusLayanan = async (id, newStatus) => {
        try {
          await updateDoc(doc(db, "layanan", id), { status: newStatus });
          fetchData();
        } catch (e) {
          alert("Gagal memperbarui status.");
        }
      };

      // Handle Hapus Layanan
      const handleDeleteLayanan = async (id) => {
        if (confirm("Hapus data permohonan ini dari riwayat?")) {
          try {
            await deleteDoc(doc(db, "layanan", id));
            fetchData();
          } catch (e) {
            alert("Gagal menghapus data permohonan.");
          }
        }
      };

      // Handle Hapus Saran
      const handleDeleteSaran = async (id) => {
        if (confirm("Hapus saran ini dari list?")) {
          try {
            await deleteDoc(doc(db, "saran", id));
            fetchData();
          } catch (e) {
            alert("Gagal menghapus masukan.");
          }
        }
      };

      return (
        <div className="max-w-7xl mx-auto px-4 space-y-6">
          <div className="flex flex-wrap justify-between items-center gap-4 bg-slate-900/60 p-6 rounded-2xl border border-slate-800">
            <div>
              <h2 className="text-xl font-bold">⚙️ Dashboard Pengelola E-Gov Siraman</h2>
              <p className="text-xs text-slate-400">Pusat Operasional Pelayanan Publik, Penjemputan Berkas, & Informasi Kelurahan</p>
            </div>
            
            <div className="flex gap-2">
              <button onClick={() => setActiveTab('berita')} className={`px-4 py-2 rounded-xl text-xs font-bold transition ${activeTab==='berita'?'bg-brand-600 text-white':'bg-slate-800 text-slate-400 hover:text-slate-200'}`}>
                📰 Kelola Berita ({berita.length})
              </button>
              <button onClick={() => setActiveTab('layanan')} className={`px-4 py-2 rounded-xl text-xs font-bold transition ${activeTab==='layanan'?'bg-brand-600 text-white':'bg-slate-800 text-slate-400 hover:text-slate-200'}`}>
                📦 Jemput Berkas ({layanan.length})
              </button>
              <button onClick={() => setActiveTab('saran')} className={`px-4 py-2 rounded-xl text-xs font-bold transition ${activeTab==='saran'?'bg-brand-600 text-white':'bg-slate-800 text-slate-400 hover:text-slate-200'}`}>
                💬 Masukan Warga ({saran.length})
              </button>
            </div>
          </div>

          {/* TAB 1: KELOLA BERITA */}
          {activeTab === 'berita' && (
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              {/* Form Input Berita Baru */}
              <div className="glass-panel p-6 rounded-2xl border border-slate-800 space-y-4 h-fit">

                    <label className="block mb-1 font-medium">Judul Berita / Pengumuman *</label>
                    <input required type="text" value={judul} onChange={e=>setJudul(e.target.value)} className="w-full px-4 py-2.5 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500" placeholder="Judul postingan..." />
                  </div>
                  <div>
                    <label className="block mb-1 font-medium">Kategori *</label>
                    <select value={kategori} onChange={e=>setKategori(e.target.value)} className="w-full px-4 py-2.5 rounded-xl bg-slate-900 border border-slate-800 outline-none focus:border-brand-500 text-slate-200">

                ) : (
                  <div className="space-y-3">
                    {berita.map(b => (
                      <div key={b.id} className="glass-card p-4 rounded-2xl border border-slate-800 flex items-start justify-between gap-4">

                          )}
                          <div className="space-y-1">
                            <span className="text-[10px] font-bold text-brand-400 uppercase tracking-wider">{b.kategori || 'Pengumuman'}</span>
                            <h4 className="font-bold text-xs text-slate-100 line-clamp-1">{b.judul}</h4>
                            <p className="text-[11px] text-slate-400 line-clamp-1">{b.isi}</p>
                          </div>
                        </div>
                        <button onClick={() => handleDeleteBerita(b.id)} className="p-2 rounded-xl bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white transition text-xs shrink-0">
                          🗑️ Hapus
                        </button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* TAB 2: KELOLA JEMPUT BERKAS */}
          {activeTab === 'layanan' && (
            <div className="space-y-4">
              <h3 className="font-bold text-base text-slate-200">Permohonan Surat & Penjemputan Berkas Masuk</h3>
              {layanan.length === 0 ? (
                <div className="p-8 text-center glass-panel rounded-2xl border border-slate-800 text-xs text-slate-500">
                  Belum ada permohonan layanan baru dari warga.
                </div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {layanan.map(l => (
                    <div key={l.id} className="glass-panel p-5 rounded-2xl border border-slate-800 space-y-3">
                      <div className="flex justify-between items-start border-b border-slate-800 pb-3">
                        <div>
                          <h4 className="font-bold text-sm text-slate-100">{l.nama}</h4>
                          <p className="text-xs text-brand-400 font-medium">{l.jenisSurat}</p>
                        </div>
                        <select 
                          value={l.status || "Menunggu Penjemputan"} 
                          onChange={(e) => handleUpdateStatusLayanan(l.id, e.target.value)}
                          className="text-[11px] font-bold px-2.5 py-1 rounded-lg bg-slate-900 border border-slate-700 text-slate-200 outline-none"
                        >
                          <option value="Menunggu Penjemputan">⏳ Menunggu Penjemputan</option>
                          <option value="Sedang Diproses">🔄 Sedang Diproses</option>
                          <option value="Selesai">✅ Selesai</option>
                        </select>
                      </div>

                      <div className="text-xs space-y-1 text-slate-400">
                        <p><span className="text-slate-500 font-medium">NIK:</span> {l.nik}</p>
                        <p><span className="text-slate-500 font-medium">Padukuhan / RT:</span> {l.padukuhan}</p>
                        <p><span className="text-slate-500 font-medium">WhatsApp:</span> <a href={`https://wa.me/${l.whatsapp}`} target="_blank" className="text-brand-400 underline">{l.whatsapp}</a></p>
                        {l.catatan && <p><span className="text-slate-500 font-medium">Patokan Lokasi:</span> {l.catatan}</p>}
                      </div>

                      {l.lampiran && (
                        <div className="pt-2">
                          <p className="text-[10px] text-slate-500 mb-1">Lampiran Foto Persyaratan:</p>
                          <img src={l.lampiran} className="h-32 w-full object-cover rounded-xl border border-slate-800" />
                        </div>
                      )}

                      <div className="pt-2 border-t border-slate-800/80 flex justify-end">
                        <button onClick={() => handleDeleteLayanan(l.id)} className="text-[11px] text-red-400 hover:underline">
                          Hapus Permohonan
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* TAB 3: MASUKAN WARGA */}
          {activeTab === 'saran' && (
            <div className="space-y-4">
              <h3 className="font-bold text-base text-slate-200">Aspirasi & Masukan Warga Siraman</h3>
              {saran.length === 0 ? (
                <div className="p-8 text-center glass-panel rounded-2xl border border-slate-800 text-xs text-slate-500">
                  Belum ada kritik dan saran yang masuk.
                </div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {saran.map(s => (
                    <div key={s.id} className="glass-card p-5 rounded-2xl border border-slate-800 space-y-2 flex justify-between items-start">
                      <div>
                        <span className="text-[10px] text-brand-400 font-bold uppercase">{s.nama || 'Anonim'}</span>
                        <p className="text-xs text-slate-200 mt-1 leading-relaxed">{s.pesan}</p>
                        <span className="text-[10px] text-slate-500 block mt-2">{new Date(s.timestamp || Date.now()).toLocaleString('id-ID')}</span>
                      </div>
                      <button onClick={() => handleDeleteSaran(s.id)} className="text-xs text-red-400 hover:text-red-300 p-1">
                        🗑️
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // Render React App to DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
